{% extends "base.html" %}

{% block title %}Вхід{% endblock %}

{% block content %}
<section class="auth-box">
    <h1>Увійти</h1>
    <form method="post" class="form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button" type="submit">Увійти</button>
    </form>
    <a href="{% url 'password_reset' %}">Забули пароль?</a>
</section>
{% endblock %}
